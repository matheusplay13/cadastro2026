<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro - Clientes e Produtos</title>
    <link rel="stylesheet" href="style.css">
    
        * 
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 Sistema de Cadastro</h1>
            <p>Gerenciamento de Clientes e Produtos</p>
        </div>

        <div class="menu-principal">
            <button class="menu-btn clientes" onclick="mostrarSecao('clientes')">
                👥 Clientes
            </button>
            <button class="menu-btn produtos" onclick="mostrarSecao('produtos')">
                📦 Produtos
            </button>
        </div>

        <!-- SEÇÃO DE CLIENTES -->
        <div id="clientes" class="content">
            <h2>👥 Gerenciamento de Clientes</h2>
            
            <div class="grid">
                <!-- Formulário de Cadastro -->
                <div class="form-section">
                    <h3>Cadastrar Novo Cliente</h3>
                    <form id="formCliente">
                        <div class="form-group">
                            <label for="nomeCliente">Nome Completo *</label>
                            <input type="text" id="nomeCliente" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="cpfCliente">CPF *</label>
                            <input type="text" id="cpfCliente" placeholder="Apenas números" maxlength="11" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="emailCliente">E-mail</label>
                            <input type="email" id="emailCliente">
                        </div>
                        
                        <div class="form-group">
                            <label for="telefoneCliente">Telefone *</label>
                            <input type="text" id="telefoneCliente" placeholder="Com DDD" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="enderecoCliente">Endereço</label>
                            <textarea id="enderecoCliente" rows="3"></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-success">💾 Cadastrar Cliente</button>
                        <button type="button" class="btn btn-warning" onclick="limparFormCliente()">🔄 Limpar</button>
                    </form>
                </div>

                <!-- Consulta e Lista -->
                <div class="list-section">
                    <h3>Consulta de Clientes</h3>
                    
                    <div class="search-box">
                        <input type="text" id="buscaCliente" placeholder="Buscar por nome, CPF ou email..." onkeyup="buscarClientes()">
                    </div>
                    
                    <button class="btn btn-primary" onclick="listarTodosClientes()">📋 Listar Todos</button>
                    
                    <div id="listaClientes"></div>
                </div>
            </div>
        </div>

        <!-- SEÇÃO DE PRODUTOS -->
        <div id="produtos" class="content">
            <h2>📦 Gerenciamento de Produtos</h2>
            
            <div class="grid">
                <!-- Formulário de Cadastro -->
                <div class="form-section">
                    <h3>Cadastrar Novo Produto</h3>
                    <form id="formProduto">
                        <div class="form-group">
                            <label for="nomeProduto">Nome do Produto *</label>
                            <input type="text" id="nomeProduto" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="descricaoProduto">Descrição</label>
                            <textarea id="descricaoProduto" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="precoProduto">Preço (R$) *</label>
                            <input type="number" id="precoProduto" step="0.01" min="0" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="quantidadeProduto">Quantidade em Estoque *</label>
                            <input type="number" id="quantidadeProduto" min="0" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="categoriaProduto">Categoria</label>
                            <input type="text" id="categoriaProduto">
                        </div>
                        
                        <div class="form-group">
                            <label for="fornecedorProduto">Fornecedor</label>
                            <input type="text" id="fornecedorProduto">
                        </div>
                        
                        <button type="submit" class="btn btn-success">💾 Cadastrar Produto</button>
                        <button type="button" class="btn btn-warning" onclick="limparFormProduto()">🔄 Limpar</button>
                    </form>
                </div>

                <!-- Consulta e Lista -->
                <div class="list-section">
                    <h3>Consulta de Produtos</h3>
                    
                    <div class="search-box">
                        <input type="text" id="buscaProduto" placeholder="Buscar por nome, categoria..." onkeyup="buscarProdutos()">
                    </div>
                    
                    <button class="btn btn-primary" onclick="listarTodosProdutos()">📋 Listar Todos</button>
                    
                    <div id="listaProdutos"></div>
                </div>
            </div>
        </div>

        <!-- Área de Alertas -->
        <div id="alertContainer"></div>
    </div>

    <script>
        // Banco de dados em memória (simulado)
        let clientes = [];
        let produtos = [];
        let nextIdCliente = 1;
        let nextIdProduto = 1;

        // Carregar dados do localStorage se existirem
        function carregarDados() {
            const dadosSalvos = localStorage.getItem('sistemaCadastro');
            if (dadosSalvos) {
                const dados = JSON.parse(dadosSalvos);
                clientes = dados.clientes || [];
                produtos = dados.produtos || [];
                nextIdCliente = dados.nextIdCliente || 1;
                nextIdProduto = dados.nextIdProduto || 1;
            }
        }

        // Salvar dados no localStorage
        function salvarDados() {
            const dados = {
                clientes: clientes,
                produtos: produtos,
                nextIdCliente: nextIdCliente,
                nextIdProduto: nextIdProduto
            };
            localStorage.setItem('sistemaCadastro', JSON.stringify(dados));
        }

        // Mostrar seção específica
        function mostrarSecao(secao) {
            // Esconder todas as seções
            document.querySelectorAll('.content').forEach(content => {
                content.classList.remove('active');
            });
            
            // Mostrar seção selecionada
            document.getElementById(secao).classList.add('active');
        }

        // Sistema de alertas
        function mostrarAlerta(mensagem, tipo = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${tipo}`;
            alertDiv.textContent = mensagem;
            
            alertContainer.appendChild(alertDiv);
            
            // Remover alerta após 3 segundos
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }

        // VALIDAÇÕES
        function validarCPF(cpf) {
            return cpf.length === 11 && /^\d+$/.test(cpf);
        }

        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // CLIENTES
        document.getElementById('formCliente').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nomeCliente').value.trim();
            const cpf = document.getElementById('cpfCliente').value.trim();
            const email = document.getElementById('emailCliente').value.trim();
            const telefone = document.getElementById('telefoneCliente').value.trim();
            const endereco = document.getElementById('enderecoCliente').value.trim();
            
            // Validações
            if (!nome) {
                mostrarAlerta('Nome é obrigatório!', 'danger');
                return;
            }
            
            if (!validarCPF(cpf)) {
                mostrarAlerta('CPF inválido! Digite 11 números.', 'danger');
                return;
            }
            
            // Verificar CPF duplicado
            if (clientes.find(c => c.cpf === cpf)) {
                mostrarAlerta('Já existe um cliente com este CPF!', 'danger');
                return;
            }
            
            if (email && !validarEmail(email)) {
                mostrarAlerta('E-mail inválido!', 'danger');
                return;
            }
            
            // Cadastrar cliente
            const cliente = {
                id: nextIdCliente++,
                nome: nome,
                cpf: cpf,
                email: email || 'Não informado',
                telefone: telefone,
                endereco: endereco || 'Não informado',
                dataCadastro: new Date().toLocaleString('pt-BR'),
                status: 'ativo'
            };
            
            clientes.push(cliente);
            salvarDados();
            
            mostrarAlerta(`Cliente "${nome}" cadastrado com sucesso!`, 'success');
            limparFormCliente();
            listarTodosClientes();
        });

        function limparFormCliente() {
            document.getElementById('formCliente').reset();
        }

        function listarTodosClientes() {
            const listaDiv = document.getElementById('listaClientes');
            
            if (clientes.length === 0) {
                listaDiv.innerHTML = '<p>Nenhum cliente cadastrado.</p>';
                return;
            }
            
            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            clientes.forEach(cliente => {
                const statusClass = cliente.status === 'ativo' ? 'status-active' : 'status-inactive';
                html += `
                    <tr>
                        <td>${cliente.id}</td>
                        <td>${cliente.nome}</td>
                        <td>${cliente.cpf}</td>
                        <td>${cliente.telefone}</td>
                        <td><span class="status-badge ${statusClass}">${cliente.status}</span></td>
                        <td>
                            <button class="btn btn-primary" onclick="verDetalhesCliente(${cliente.id})">👁️ Ver</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            listaDiv.innerHTML = html;
        }

        function verDetalhesCliente(id) {
            const cliente = clientes.find(c => c.id === id);
            if (!cliente) return;
            
            const detalhes = `
                <strong>ID:</strong> ${cliente.id}<br>
                <strong>Nome:</strong> ${cliente.nome}<br>
                <strong>CPF:</strong> ${cliente.cpf}<br>
                <strong>E-mail:</strong> ${cliente.email}<br>
                <strong>Telefone:</strong> ${cliente.telefone}<br>
                <strong>Endereço:</strong> ${cliente.endereco}<br>
                <strong>Data de Cadastro:</strong> ${cliente.dataCadastro}<br>
                <strong>Status:</strong> ${cliente.status}
            `;
            
            alert(detalhes);
        }

        function buscarClientes() {
            const termo = document.getElementById('buscaCliente').value.toLowerCase();
            const listaDiv = document.getElementById('listaClientes');
            
            if (!termo) {
                listarTodosClientes();
                return;
            }
            
            const filtrados = clientes.filter(cliente => 
                cliente.nome.toLowerCase().includes(termo) ||
                cliente.cpf.includes(termo) ||
                cliente.email.toLowerCase().includes(termo)
            );
            
            if (filtrados.length === 0) {
                listaDiv.innerHTML = '<p>Nenhum cliente encontrado.</p>';
                return;
            }
            
            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filtrados.forEach(cliente => {
                html += `
                    <tr>
                        <td>${cliente.id}</td>
                        <td>${cliente.nome}</td>
                        <td>${cliente.cpf}</td>
                        <td>${cliente.telefone}</td>
                        <td>
                            <button class="btn btn-primary" onclick="verDetalhesCliente(${cliente.id})">👁️ Ver</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            listaDiv.innerHTML = html;
        }

        // PRODUTOS
        document.getElementById('formProduto').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nomeProduto').value.trim();
            const descricao = document.getElementById('descricaoProduto').value.trim();
            const preco = parseFloat(document.getElementById('precoProduto').value);
            const quantidade = parseInt(document.getElementById('quantidadeProduto').value);
            const categoria = document.getElementById('categoriaProduto').value.trim();
            const fornecedor = document.getElementById('fornecedorProduto').value.trim();
            
            // Validações
            if (!nome) {
                mostrarAlerta('Nome do produto é obrigatório!', 'danger');
                return;
            }
            
            if (preco <= 0) {
                mostrarAlerta('Preço deve ser maior que zero!', 'danger');
                return;
            }
            
            if (quantidade < 0) {
                mostrarAlerta('Quantidade não pode ser negativa!', 'danger');
                return;
            }
            
            // Verificar produto duplicado
            if (produtos.find(p => p.nome.toLowerCase() === nome.toLowerCase())) {
                mostrarAlerta('Já existe um produto com este nome!', 'danger');
                return;
            }
            
            // Cadastrar produto
            const produto = {
                id: nextIdProduto++,
                nome: nome,
                descricao: descricao || 'Sem descrição',
                preco: preco,
                quantidadeEstoque: quantidade,
                categoria: categoria || 'Sem categoria',
                fornecedor: fornecedor || 'Não informado',
                dataCadastro: new Date().toLocaleString('pt-BR'),
                status: 'ativo'
            };
            
            produtos.push(produto);
            salvarDados();
            
            mostrarAlerta(`Produto "${nome}" cadastrado com sucesso!`, 'success');
            limparFormProduto();
            listarTodosProdutos();
        });

        function limparFormProduto() {
            document.getElementById('formProduto').reset();
        }

        function listarTodosProdutos() {
            const listaDiv = document.getElementById('listaProdutos');
            
            if (produtos.length === 0) {
                listaDiv.innerHTML = '<p>Nenhum produto cadastrado.</p>';
                return;
            }
            
            // Agrupar por categoria
            const categorias = {};
            produtos.forEach(produto => {
                if (!categorias[produto.categoria]) {
                    categorias[produto.categoria] = [];
                }
                categorias[produto.categoria].push(produto);
            });
            
            let html = '';
            
            for (const [categoria, produtosCat] of Object.entries(categorias)) {
                html += `<h4>📂 ${categoria}</h4>`;
                html += `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                produtosCat.forEach(produto => {
                    const estoqueClass = produto.quantidadeEstoque === 0 ? 'status-inactive' : 
                                       produto.quantidadeEstoque < 5 ? 'alert-warning' : '';
                    
                    html += `
                        <tr>
                            <td>${produto.id}</td>
                            <td>${produto.nome}</td>
                            <td>R$ ${produto.preco.toFixed(2)}</td>
                            <td><span class="status-badge ${estoqueClass}">${produto.quantidadeEstoque}</span></td>
                            <td>
                                <button class="btn btn-primary" onclick="verDetalhesProduto(${produto.id})">👁️ Ver</button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table><br>';
            }
            
            // Resumo do estoque
            const totalItens = produtos.reduce((sum, p) => sum + p.quantidadeEstoque, 0);
            const valorTotal = produtos.reduce((sum, p) => sum + (p.preco * p.quantidadeEstoque), 0);
            
            html += `
                <div class="alert alert-info">
                    <strong>📊 Resumo do Estoque:</strong><br>
                    Total de itens: ${totalItens} | Valor total: R$ ${valorTotal.toFixed(2)}
                </div>
            `;
            
            listaDiv.innerHTML = html;
        }

        function verDetalhesProduto(id) {
            const produto = produtos.find(p => p.id === id);
            if (!produto) return;
            
            const detalhes = `
                <strong>ID:</strong> ${produto.id}<br>
                <strong>Nome:</strong> ${produto.nome}<br>
                <strong>Descrição:</strong> ${produto.descricao}<br>
                <strong>Preço:</strong> R$ ${produto.preco.toFixed(2)}<br>
                <strong>Quantidade em Estoque:</strong> ${produto.quantidadeEstoque}<br>
                <strong>Categoria:</strong> ${produto.categoria}<br>
                <strong>Fornecedor:</strong> ${produto.fornecedor}<br>
                <strong>Data de Cadastro:</strong> ${produto.dataCadastro}<br>
                <strong>Status:</strong> ${produto.status}
            `;
            
            alert(detalhes);
        }

        function buscarProdutos() {
            const termo = document.getElementById('buscaProduto').value.toLowerCase();
            const listaDiv = document.getElementById('listaProdutos');
            
            if (!termo) {
                listarTodosProdutos();
                return;
            }
            
            const filtrados = produtos.filter(produto => 
                produto.nome.toLowerCase().includes(termo) ||
                produto.categoria.toLowerCase().includes(termo) ||
                produto.descricao.toLowerCase().includes(termo)
            );
            
            if (filtrados.length === 0) {
                listaDiv.innerHTML = '<p>Nenhum produto encontrado.</p>';
                return;
            }
            
            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filtrados.forEach(produto => {
                html += `
                    <tr>
                        <td>${produto.id}</td>
                        <td>${produto.nome}</td>
                        <td>${produto.categoria}</td>
                        <td>R$ ${produto.preco.toFixed(2)}</td>
                        <td>${produto.quantidadeEstoque}</td>
                        <td>
                            <button class="btn btn-primary" onclick="verDetalhesProduto(${produto.id})">👁️ Ver</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            listaDiv.innerHTML = html;
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            carregarDados();
            mostrarSecao('clientes');
            listarTodosClientes();
        });
    </script>
</body>
</html>
