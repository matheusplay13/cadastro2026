<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Cadastro de Cliente</h1>
            <p>Preencha os dados do novo cliente</p>
        </div>

        <div id="alertContainer"></div>

        <form id="formCliente">
            <div class="form-group">
                <label for="nome">Nome Completo <span class="required">*</span></label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cpf">CPF <span class="required">*</span></label>
                    <input type="text" id="cpf" name="cpf" placeholder="Apenas números" maxlength="11" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone <span class="required">*</span></label>
                    <input type="text" id="telefone" name="telefone" placeholder="Com DDD" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com">
            </div>

            <div class="form-group">
                <label for="endereco">Endereço Completo</label>
                <textarea id="endereco" name="endereco" rows="3" placeholder="Rua, número, bairro, cidade - Estado"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                💾 Cadastrar Cliente
            </button>

            <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                🔄 Limpar Formulário
            </button>
        </form>
    </div>

    <script>
        // Banco de dados em memória (simulado)
        let clientes = [];
        let nextId = 1;

        // Carregar dados do localStorage se existirem
        function carregarDados() {
            const dadosSalvos = localStorage.getItem('clientes');
            if (dadosSalvos) {
                clientes = JSON.parse(dadosSalvos);
                nextId = clientes.length > 0 ? Math.max(...clientes.map(c => c.id)) + 1 : 1;
            }
        }

        // Salvar dados no localStorage
        function salvarDados() {
            localStorage.setItem('clientes', JSON.stringify(clientes));
        }

        // Mostrar alerta
        function mostrarAlerta(mensagem, tipo = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${tipo}`;
            alertDiv.textContent = mensagem;
            
            alertContainer.appendChild(alertDiv);
            
            // Remover alerta após 3 segundos
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }

        // Validações
        function validarCPF(cpf) {
            return cpf.length === 11 && /^\d+$/.test(cpf);
        }

        function validarEmail(email) {
            if (!email) return true; // Email é opcional
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Limpar formulário
        function limparFormulario() {
            document.getElementById('formCliente').reset();
            mostrarAlerta('Formulário limpo!', 'warning');
        }

        // Formatar CPF enquanto digita
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            e.target.value = value;
        });

        // Formatar telefone enquanto digita
        document.getElementById('telefone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 0) {
                if (value.length <= 2) {
                    value = `(${value}`;
                } else if (value.length <= 7) {
                    value = `(${value.slice(0, 2)}) ${value.slice(2)}`;
                } else {
                    value = `(${value.slice(0, 2)}) ${value.slice(2, 7)}-${value.slice(7, 11)}`;
                }
            }
            e.target.value = value;
        });

        // Submit do formulário
        document.getElementById('formCliente').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Obter valores do formulário
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.replace(/\D/g, ''); // Remove formatação
            const telefone = document.getElementById('telefone').value.replace(/\D/g, ''); // Remove formatação
            const email = document.getElementById('email').value.trim();
            const endereco = document.getElementById('endereco').value.trim();
            
            // Validações
            if (!nome) {
                mostrarAlerta('Nome é obrigatório!', 'danger');
                return;
            }
            
            if (!validarCPF(cpf)) {
                mostrarAlerta('CPF inválido! Digite exatamente 11 números.', 'danger');
                return;
            }
            
            if (!telefone) {
                mostrarAlerta('Telefone é obrigatório!', 'danger');
                return;
            }
            
            if (telefone.length < 10) {
                mostrarAlerta('Telefone inválido! Digite pelo menos 10 números (incluindo DDD).', 'danger');
                return;
            }
            
            if (email && !validarEmail(email)) {
                mostrarAlerta('E-mail inválido!', 'danger');
                return;
            }
            
            // Verificar se CPF já existe
            if (clientes.find(cliente => cliente.cpf === cpf)) {
                mostrarAlerta('Já existe um cliente com este CPF!', 'danger');
                return;
            }
            
            // Criar objeto cliente
            const cliente = {
                id: nextId++,
                nome: nome,
                cpf: cpf,
                telefone: telefone,
                email: email || 'Não informado',
                endereco: endereco || 'Não informado',
                dataCadastro: new Date().toLocaleString('pt-BR'),
                status: 'ativo'
            };
            
            // Adicionar à lista
            clientes.push(cliente);
            salvarDados();
            
            // Mostrar sucesso
            mostrarAlerta(`Cliente "${nome}" cadastrado com sucesso! ID: ${cliente.id}`, 'success');
            
            // Limpar formulário
            limparFormulario();
            
            // Mostrar dados cadastrados no console
            console.log('Cliente cadastrado:', cliente);
            console.log('Total de clientes:', clientes.length);
        });

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            carregarDados();
            console.log('Sistema carregado. Total de clientes:', clientes.length);
        });
    </script>
</body>
</html>
